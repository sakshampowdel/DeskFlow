spring:
application:
name:user-service
# MongoDB Configuration
# Note: Host 'mongodb' refers to the shared Mongo container
mongodb:
uri:mongodb://${MONGO_ROOT_USER:admin}:${MONGO_ROOT_PASSWORD:deskflow_pass}@mongodb:27017/user-db?authSource=admin
data:
mongodb:
auto-index-creation:true
# Kafka Configuration
kafka:
bootstrap-servers:${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
consumer:
group-id:user-group
auto-offset-reset:earliest
key-deserializer:org.apache.kafka.common.serialization.StringDeserializer
value-deserializer:org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
properties:
spring.deserializer.value.delegate.class:org.springframework.kafka.support.serializer.JsonDeserializer
spring.json.trusted.packages:"com.deskflow.*"
spring.json.value.default.type:com.deskflow.userservice.dto.event.EventEnvelope
server:
port:${USER_PORT:8082}
logging:
level:
org:
springframework:
web:DEBUG
data:
mongodb:DEBUG
kafka:DEBUG