spring:
  application:
    name: analytics-service

  # MongoDB Configuration
  mongodb:
    uri: mongodb://${MONGO_ROOT_USER:admin}:${MONGO_ROOT_PASSWORD:deskflow_pass}@mongodb:27017/analytics-db?authSource=admin
  data:
    mongodb:
      auto-index-creation: true

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: analytics-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.deskflow.*"
        spring.json.value.default.type: com.deskflow.analyticsservice.dto.event.EventEnvelope

server:
  port: ${ANALYTICS_PORT:8085}

logging:
  level:
    org:
      springframework:
        web: DEBUG
        data:
          mongodb: DEBUG
        kafka: DEBUG