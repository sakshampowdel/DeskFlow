spring.application.name=notification-service
# Database Connectivity
spring.mongodb.host=localhost
spring.mongodb.port=27020
spring.mongodb.database=notification_db
spring.data.mongodb.auto-index-creation=true
# Kafka Bootstrap Server
spring.kafka.bootstrap-servers=localhost:9092
# Consumer Config
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest
# Deserialization setup
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.deskflow.*
spring.kafka.consumer.properties.spring.json.value.default.type=com.deskflow.notificationservice.dto.event.EventEnvelope
# Show exactly what is failing in the web layer
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
# This will show you every Kafka attempt
logging.level.org.springframework.kafka=DEBUG