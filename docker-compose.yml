services:
  # --- DATABASES (One for each service) ---
  auth-mongodb:
    image: mongo:latest
    container_name: auth-mongodb
    ports: ['27017:27017']
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=auth-db
    volumes: [auth-data:/data/db]
    networks: [app-network]
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  user-mongodb:
    image: mongo:latest
    container_name: user-mongodb
    ports: ['27018:27017']
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=user-db
    volumes: [user-data:/data/db]
    networks: [app-network]
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ticket-mongodb:
    image: mongo:latest
    container_name: ticket-mongodb
    ports: ['27019:27017']
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=ticket-db
    volumes: [ticket-data:/data/db]
    networks: [app-network]
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  notification-mongodb:
    image: mongo:latest
    container_name: notification-mongodb
    ports: ['27020:27017']
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=notification-db
    volumes: [notification-data:/data/db]
    networks: [app-network]
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  analytics-mongodb:
    image: mongo:latest
    container_name: analytics-mongodb
    ports: ['27021:27017']
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=analytics-db
    volumes: [analytics-data:/data/db]
    networks: [app-network]
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- KAFKA INFRASTRUCTURE (KRaft Mode) ---
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    ports: ['9092:9092']
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test:
        [
          'CMD',
          'kafka-broker-api-versions',
          '--bootstrap-server',
          'kafka:29092',
        ]
      interval: 10s
      timeout: 10s
      retries: 5
    volumes: [kafka-data:/var/lib/kafka/data]
    networks: [app-network]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports: ['8888:8080']
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks: [app-network]

  # --- MICROSERVICES ---
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports: ['${GATEWAY_PORT:-8080}:8080']
    env_file: .env
    environment:
      - SPRING_DATA_MONGODB_URI=none # Gateway doesn't need DB
    depends_on:
      - auth-service
      - user-service
    networks: [app-network]

  auth-service:
    build: ./auth-service
    container_name: auth-service
    env_file: .env
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://auth-mongodb:27017/auth-db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      auth-mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks: [app-network]

  user-service:
    build: ./user-service
    container_name: user-service
    env_file: .env
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://user-mongodb:27017/user-db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      user-mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks: [app-network]

  ticket-service:
    build: ./ticket-service
    container_name: ticket-service
    env_file: .env
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://ticket-mongodb:27017/ticket-db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      ticket-mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks: [app-network]

  notification-service:
    build: ./notification-service
    container_name: notification-service
    env_file: .env
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://notification-mongodb:27017/notification-db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      notification-mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks: [app-network]

  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    env_file: .env
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://analytics-mongodb:27017/analytics-db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      analytics-mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks: [app-network]

networks:
  app-network:
    driver: bridge

volumes:
  auth-data:
  user-data:
  ticket-data:
  notification-data:
  analytics-data:
  kafka-data:
