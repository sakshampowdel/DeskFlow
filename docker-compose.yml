version: '3.8'

services:
  # Database for Auth Service
  auth-mongodb:
    image: mongo:latest
    container_name: auth-mongodb
    ports:
      - '27017:27017'
    environment:
      - MONGO_INITDB_DATABASE=auth-db
    volumes:
      - auth-data:/data/db

  # Database for User Service
  user-mongodb:
    image: mongo:latest
    container_name: user-mongodb
    ports:
      - '27018:27017' # Map host 27018 to container 27017
    environment:
      - MONGO_INITDB_DATABASE=user-db
    volumes:
      - user-data:/data/db

volumes:
  auth-data:
  user-data:
